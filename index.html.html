<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hexa Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#09090f;
  --bg2:#0f0f1a;
  --bg3:#161625;
  --bg4:#1e1e30;
  --border:#252540;
  --text:#eeeeff;
  --text2:#8888bb;
  --text3:#4a4a72;
  --accent:#7b5cfa;
  --accent2:#a78bfa;
  --accent3:#2dd4bf;
  --accent-bg:rgba(123,92,250,0.13);
  --green:#2dd4bf;
  --amber:#f59e0b;
  --red:#f87171;
  --teal:#2dd4bf;
  --pink:#f472b6;
  --grad:linear-gradient(135deg,#7b5cfa 0%,#2dd4bf 100%);
  --radius:12px;
  --radius-sm:8px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* AUTH */
.auth-wrap{
  display:flex;align-items:center;justify-content:center;height:100vh;
  background:#06060e;
  position:relative;overflow:hidden;
}

/* Aurora background layers */
.auth-wrap .grid-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;}

/* Aurora band 1 - purple sweep */
.auth-wrap .grid-bg .aurora1{
  position:absolute;
  width:120%;height:55%;
  top:-10%;left:-10%;
  background:linear-gradient(105deg,
    transparent 0%,
    rgba(88,40,220,0.55) 30%,
    rgba(123,92,250,0.7) 50%,
    rgba(167,139,250,0.4) 65%,
    transparent 85%
  );
  filter:blur(55px);
  border-radius:0 0 60% 60%;
  animation:aurora1 9s ease-in-out infinite alternate;
  transform-origin:top center;
}
/* Aurora band 2 - teal sweep */
.auth-wrap .grid-bg .aurora2{
  position:absolute;
  width:110%;height:45%;
  bottom:-5%;right:-10%;
  background:linear-gradient(255deg,
    transparent 0%,
    rgba(20,160,140,0.5) 30%,
    rgba(45,212,191,0.65) 52%,
    rgba(100,230,210,0.35) 70%,
    transparent 90%
  );
  filter:blur(50px);
  border-radius:60% 60% 0 0;
  animation:aurora2 11s ease-in-out infinite alternate;
  transform-origin:bottom center;
}
/* Aurora band 3 - pink accent */
.auth-wrap .grid-bg .aurora3{
  position:absolute;
  width:70%;height:60%;
  top:20%;left:15%;
  background:radial-gradient(ellipse at center,
    rgba(196,60,220,0.25) 0%,
    rgba(139,40,200,0.15) 40%,
    transparent 70%
  );
  filter:blur(70px);
  animation:aurora3 13s ease-in-out infinite alternate;
}
/* Dot grid overlay */
.auth-wrap .grid-bg .dot-grid{
  position:absolute;inset:0;
  background-image:radial-gradient(rgba(180,160,255,0.12) 1px,transparent 1px);
  background-size:32px 32px;
}
/* Vignette */
.auth-wrap .grid-bg .vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 40%,rgba(4,4,12,0.85) 100%);
}

@keyframes aurora1{
  0%{transform:rotate(-3deg) scaleY(1) translateY(0);}
  50%{transform:rotate(1deg) scaleY(1.1) translateY(-20px);}
  100%{transform:rotate(4deg) scaleY(0.95) translateY(10px);}
}
@keyframes aurora2{
  0%{transform:rotate(2deg) scaleY(1) translateY(0);}
  50%{transform:rotate(-3deg) scaleY(1.12) translateY(15px);}
  100%{transform:rotate(-1deg) scaleY(0.9) translateY(-10px);}
}
@keyframes aurora3{
  0%{transform:scale(1) translate(0,0);}
  100%{transform:scale(1.3) translate(40px,-30px);}
}

.auth-card{background:rgba(8,8,18,0.72);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(167,139,250,0.15);border-top:1px solid rgba(167,139,250,0.25);border-radius:28px;padding:42px;width:420px;position:relative;z-index:1;box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset,0 30px 100px rgba(0,0,0,0.6),0 0 80px rgba(88,40,220,0.15);}
.auth-card::before{content:'';position:absolute;inset:0;border-radius:24px;background:linear-gradient(135deg,rgba(123,92,250,0.04),rgba(45,212,191,0.02));pointer-events:none;}

.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.auth-logo-icon{width:58px;height:58px;border-radius:16px;overflow:hidden;flex-shrink:0;box-shadow:0 0 30px rgba(123,92,250,0.5),0 0 60px rgba(45,212,191,0.15);}
.auth-logo-icon img{width:100%;height:100%;object-fit:cover;}
.auth-logo-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;
  letter-spacing:3px;
  line-height:1;
  display:flex;align-items:center;gap:6px;
}
.auth-logo-name .txt-hexa{
  color:#fff;
  text-shadow:0 0 25px rgba(167,139,250,0.8), 0 0 60px rgba(123,92,250,0.4);
}
.auth-logo-name .txt-dot{
  width:6px;height:6px;border-radius:50%;
  background:linear-gradient(135deg,#7b5cfa,#2dd4bf);
  box-shadow:0 0 10px rgba(45,212,191,0.8);
  flex-shrink:0;margin-bottom:2px;
}
.auth-logo-name span{
  background:linear-gradient(90deg,#a78bfa 0%,#2dd4bf 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
}
.auth-logo-tagline{
  font-size:9px;margin-top:5px;
  letter-spacing:0.22em;text-transform:uppercase;font-weight:600;
  background:linear-gradient(90deg,rgba(167,139,250,0.6),rgba(45,212,191,0.6));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.auth-title{font-size:20px;font-weight:700;margin-bottom:5px;letter-spacing:-0.4px;}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.5;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:22px;border:1px solid var(--border);}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--text2);transition:all 0.2s;letter-spacing:0.02em;}
.auth-tab.active{background:var(--grad);color:#fff;box-shadow:0 0 16px rgba(123,92,250,0.3);}
.field{margin-bottom:14px;}
.field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;letter-spacing:0.06em;text-transform:uppercase;}
.field input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border 0.15s,box-shadow 0.15s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(123,92,250,0.12);}
.field input::placeholder{color:var(--text3);}
.auth-btn{width:100%;padding:13px;background:var(--grad);border:none;border-radius:var(--radius-sm);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity 0.15s,transform 0.1s;margin-top:4px;letter-spacing:0.03em;box-shadow:0 4px 20px rgba(123,92,250,0.3);}
.auth-btn:hover{opacity:0.88;transform:translateY(-1px);}
.auth-btn:active{transform:translateY(0);}
.auth-err{font-size:12px;color:var(--red);margin-bottom:12px;padding:10px 12px;background:rgba(248,113,113,0.08);border-radius:var(--radius-sm);border:1px solid rgba(248,113,113,0.2);display:none;}

/* APP */
.app{display:flex;height:100vh;display:none;}

/* SIDEBAR */
.sidebar{width:256px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border);}
.sidebar-brand{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.brand-icon{width:32px;height:32px;border-radius:9px;overflow:hidden;flex-shrink:0;box-shadow:0 0 12px rgba(123,92,250,0.3);}
.brand-icon img{width:100%;height:100%;object-fit:cover;}
.brand-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:2.5px;display:flex;align-items:center;gap:4px;
}
.brand-name .txt-hexa{color:#fff;text-shadow:0 0 15px rgba(167,139,250,0.6);}
.brand-name .txt-dot{width:4px;height:4px;border-radius:50%;background:linear-gradient(135deg,#7b5cfa,#2dd4bf);box-shadow:0 0 6px rgba(45,212,191,0.8);flex-shrink:0;}
.brand-name span{background:linear-gradient(90deg,#a78bfa,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--border);}
.user-pill .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.user-pill-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.signout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;transition:color 0.1s;}
.signout-btn:hover{color:var(--red);}

.nav-tabs{display:flex;padding:10px 12px;gap:4px;}
.nav-tab{flex:1;padding:7px 4px;text-align:center;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--text2);transition:all 0.15s;letter-spacing:0.04em;}
.nav-tab.active{background:var(--accent-bg);color:var(--accent2);}
.nav-tab:hover:not(.active){background:var(--bg3);color:var(--text);}

.ch-list{flex:1;overflow-y:auto;padding:4px 8px;}
.ch-list::-webkit-scrollbar{width:4px;}
.ch-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;padding:10px 8px 4px;}
.ch-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.1s;}
.ch-item:hover{background:var(--bg3);}
.ch-item.active{background:var(--accent-bg);}
.ch-item.active .ch-name{color:var(--accent2);}
.ch-icon{width:18px;text-align:center;font-size:13px;color:var(--text3);flex-shrink:0;}
.ch-item.active .ch-icon{color:var(--accent);}
.ch-name{font-size:13px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:600;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center;}
.empty-state{padding:20px 12px;font-size:12px;color:var(--text3);text-align:center;line-height:1.6;}

.sb-actions{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;}
.sb-btn{flex:1;padding:8px 6px;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;transition:all 0.1s;}
.sb-btn:hover{background:var(--bg3);color:var(--text);}
.sb-btn.primary{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(123,92,250,0.25);}
.sb-btn.primary:hover{opacity:0.85;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-header-icon{font-size:16px;color:var(--accent);}
.chat-header-info{flex:1;}
.chat-header-name{font-size:15px;font-weight:700;letter-spacing:-0.3px;}
.chat-header-sub{font-size:12px;color:var(--text2);margin-top:1px;}
.h-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:0.03em;}
.h-public{background:rgba(45,212,191,0.12);color:var(--teal);}
.h-group{background:rgba(123,92,250,0.12);color:var(--accent2);}
.h-dm{background:rgba(244,114,182,0.12);color:var(--pink);}

.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:2px;}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}

.day-div{display:flex;align-items:center;gap:12px;margin:16px 0 8px;}
.day-div span{font-size:11px;color:var(--text3);white-space:nowrap;}
.day-line{flex:1;height:1px;background:var(--border);}

.msg-row{display:flex;gap:10px;align-items:flex-start;padding:4px 0;border-radius:var(--radius-sm);transition:background 0.1s;}
.msg-row:hover{background:var(--bg2);}
.msg-row.own{flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px;}
.msg-content{max-width:68%;}
.msg-meta{font-size:11px;color:var(--text3);margin-bottom:3px;display:flex;gap:8px;align-items:baseline;}
.msg-row.own .msg-meta{flex-direction:row-reverse;}
.msg-sender{font-weight:600;color:var(--text2);font-size:12px;}
.bubble{padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.55;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px;word-break:break-word;}
.msg-row.own .bubble{background:var(--grad);color:#fff;border:none;border-bottom-right-radius:4px;border-bottom-left-radius:14px;box-shadow:0 2px 12px rgba(123,92,250,0.25);}

.typing-indicator{display:flex;align-items:center;gap:8px;padding:8px 20px;font-size:12px;color:var(--text3);}
.typing-dots{display:flex;gap:3px;}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}

.input-area{padding:14px 20px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
.chat-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 16px;font-size:14px;font-family:inherit;background:var(--bg3);color:var(--text);outline:none;resize:none;max-height:120px;min-height:42px;line-height:1.45;transition:border 0.15s,box-shadow 0.15s;}
.chat-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(123,92,250,0.1);}
.chat-input::placeholder{color:var(--text3);}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--grad);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s,transform 0.1s;box-shadow:0 2px 14px rgba(123,92,250,0.3);}
.send-btn:hover{opacity:0.82;transform:scale(1.05);}
.send-btn svg{width:16px;height:16px;fill:#fff;}

/* EMPTY CHAT */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;text-align:center;}
.empty-chat-icon{font-size:48px;opacity:0.4;}
.empty-chat h3{font-size:17px;font-weight:700;color:var(--text2);}
.empty-chat p{font-size:13px;color:var(--text3);max-width:280px;line-height:1.6;}
.empty-btns{display:flex;gap:8px;margin-top:6px;}
.e-btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.1s;}
.e-btn.primary{background:var(--grad);color:#fff;border:none;box-shadow:0 2px 12px rgba(123,92,250,0.25);}
.e-btn.primary:hover{opacity:0.85;}
.e-btn.sec{background:transparent;color:var(--text2);border:1px solid var(--border);}
.e-btn.sec:hover{background:var(--bg3);}

/* DM PANEL */
.dm-panel{width:196px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;}
.dm-panel-hdr{padding:12px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;}
.dm-user-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;transition:background 0.1s;}
.dm-user-item:hover{background:var(--bg3);}
.dm-user-item.active{background:var(--accent-bg);}
.dm-uname{font-size:13px;color:var(--text);flex:1;}
.dm-ustatus{font-size:11px;color:var(--text3);}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sdot.online{background:var(--green);}
.sdot.away{background:var(--amber);}
.sdot.offline{background:var(--bg4);}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.modal h3{font-size:17px;font-weight:700;margin-bottom:5px;letter-spacing:-0.3px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.55;}
.modal input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;transition:border 0.15s;}
.modal input:focus{border-color:var(--accent);}
.modal input::placeholder{color:var(--text3);}
.modal-btns{display:flex;gap:8px;margin-top:6px;}
.m-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;transition:all 0.1s;}
.m-btn:hover{background:var(--bg3);color:var(--text);}
.m-btn.confirm{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(123,92,250,0.25);}
.m-btn.confirm:hover{opacity:0.85;}
.code-display{background:var(--bg3);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:16px;font-family:'DM Mono',monospace;font-size:26px;font-weight:500;letter-spacing:0.2em;text-align:center;color:var(--accent2);margin-bottom:10px;}
.code-hint{font-size:12px;color:var(--text3);text-align:center;margin-bottom:16px;}

/* STATUS BAR */
.step-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.step-item{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:background 0.15s;}
.step-item.active{background:var(--accent-bg);}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);}
.step-item.active .step-num{background:var(--grad);color:#fff;}
.step-lbl{font-size:12px;font-weight:600;color:var(--text3);}
.step-item.active .step-lbl{color:var(--accent2);}
.step-sep{width:24px;height:1px;background:var(--border);}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Avatars */
.av-a{background:rgba(123,92,250,0.2);color:var(--accent2);}
.av-b{background:rgba(45,212,191,0.2);color:var(--teal);}
.av-c{background:rgba(244,114,182,0.2);color:var(--pink);}
.av-d{background:rgba(45,212,191,0.2);color:var(--teal);}
.av-e{background:rgba(245,158,11,0.2);color:var(--amber);}

/* PROFILE PIC */
.av-pic{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-pill .av{position:relative;cursor:pointer;overflow:hidden;}
.user-pill .av:hover::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:50%;}
.pic-upload-inp{display:none;}

/* Profile modal */
.profile-modal{text-align:center;}
.profile-modal .big-av{width:90px;height:90px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;position:relative;overflow:hidden;cursor:pointer;border:3px solid var(--accent);box-shadow:0 0 20px rgba(123,92,250,0.3);}

.profile-modal .prof-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.profile-modal .prof-email{font-size:12px;color:var(--text3);margin-bottom:20px;}
.profile-modal .prof-hint{font-size:11px;color:var(--text3);margin-bottom:16px;}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut as fbSignOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, getDoc, setDoc, getDocs, query, orderBy, limit, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPqT1ivKc5zThvg0U-tQ-sjl411u86riE",
  authDomain: "hexa-chat-c38af.firebaseapp.com",
  projectId: "hexa-chat-c38af",
  storageBucket: "hexa-chat-c38af.firebasestorage.app",
  messagingSenderId: "529076806141",
  appId: "1:529076806141:web:a84fd082137c82e73ab994",
  measurementId: "G-FXG283D8YJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ---- STATE ----
const state = {
  user: null,
  tab: 'public',
  activeChannel: 'general',
  activeGroup: null,
  activeDM: null,
  unsubMsg: null,
  unsubDMList: null,
  myGroups: [],
  dmContacts: [],
  myPhoto: null,
  photoCache: {}, // uid -> base64
};

const PUBLIC_CHANNELS = [
  { id: 'general', label: 'general', desc: 'General discussion · open to all' },
  { id: 'random', label: 'random', desc: 'Off-topic fun & memes' },
  { id: 'announcements', label: 'announcements', desc: 'Important updates' },
];

const AV_COLORS = ['av-a','av-b','av-c','av-d','av-e'];
function avColor(uid){ let h=0; for(let i=0;i<uid.length;i++) h=(h<<5)-h+uid.charCodeAt(i); return AV_COLORS[Math.abs(h)%AV_COLORS.length]; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function genCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
function scrollBottom(){ const a=document.getElementById('msgs-area'); if(a) a.scrollTop=a.scrollHeight; }
function timeStr(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

// ---- AUTH UI ----
let authMode = 'login';
window.switchAuth = function(mode){
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-signup').classList.toggle('active', mode==='signup');
  document.getElementById('name-field').style.display = mode==='signup'?'':'none';
  document.getElementById('auth-submit').textContent = mode==='login'?'Sign in':'Create account';
  document.getElementById('auth-err').style.display='none';
};

window.doAuth = async function(){
  const btn = document.getElementById('auth-submit');
  const errEl = document.getElementById('auth-err');
  errEl.style.display='none';
  const email = document.getElementById('inp-email').value.trim();
  const pass = document.getElementById('inp-pass').value;
  const name = document.getElementById('inp-name').value.trim();
  if(!email||!pass){ showErr('Please fill in all fields.'); return; }
  btn.innerHTML='<span class="spinner"></span>Please wait…'; btn.disabled=true;
  try {
    if(authMode==='signup'){
      if(!name){ showErr('Please enter a display name.'); return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db,'users',cred.user.uid),{ name, email, uid: cred.user.uid, createdAt: serverTimestamp() });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e){
    showErr(e.message.replace('Firebase: ','').replace(/\(.*\)/,''));
    btn.innerHTML = authMode==='login'?'Sign in':'Create account'; btn.disabled=false;
  }
};

function showErr(msg){ const e=document.getElementById('auth-err'); e.textContent=msg; e.style.display='block'; }

// ---- AUTH STATE ----
onAuthStateChanged(auth, async user => {
  if(user){
    state.user = user;
    document.getElementById('auth-wrap').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('my-av').textContent = initials(user.displayName||user.email);
    document.getElementById('my-av').className = 'av '+avColor(user.uid);
    document.getElementById('my-name-lbl').textContent = user.displayName || user.email;
    await loadMyGroups();
    await loadDMContacts();
    // Load profile pic
    const uDoc = await getDoc(doc(db,'users',user.uid));
    if(uDoc.exists() && uDoc.data().photoBase64){
      state.myPhoto = uDoc.data().photoBase64;
      setMyAvatar(state.myPhoto);
    }
    switchTab('public');
  } else {
    state.user=null;
    document.getElementById('auth-wrap').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

window.signOut = () => fbSignOut(auth);

// ---- TABS ----
window.switchTab = function(tab){
  state.tab=tab;
  ['public','group','dm'].forEach((t,i)=>{
    document.querySelectorAll('.nav-tab')[i].classList.toggle('active',t===tab);
    document.getElementById('step-'+(i+1)).classList.toggle('active',t===tab);
  });
  document.getElementById('dm-panel').style.display = tab==='dm'?'':'none';
  renderSidebar();
  renderChat();
};

// ---- SIDEBAR ----
function renderSidebar(){
  const list = document.getElementById('ch-list');
  const actions = document.getElementById('sb-actions');
  list.innerHTML=''; actions.innerHTML='';

  if(state.tab==='public'){
    list.innerHTML='<div class="sec-label">Channels</div>';
    PUBLIC_CHANNELS.forEach(ch=>{
      const d=document.createElement('div');
      d.className='ch-item'+(state.activeChannel===ch.id?' active':'');
      d.innerHTML=`<span class="ch-icon">#</span><span class="ch-name">${ch.label}</span>`;
      d.onclick=()=>{ state.activeChannel=ch.id; renderSidebar(); renderChat(); };
      list.appendChild(d);
    });
    actions.innerHTML='';
  }

  if(state.tab==='group'){
    list.innerHTML='<div class="sec-label">My Rooms</div>';
    if(state.myGroups.length===0){
      list.innerHTML+='<div class="empty-state">No rooms yet.<br/>Create one or join with a code.</div>';
    } else {
      state.myGroups.forEach(g=>{
        const d=document.createElement('div');
        d.className='ch-item'+(state.activeGroup===g.id?' active':'');
        d.innerHTML=`<span class="ch-icon">◈</span><span class="ch-name">${g.name}</span>`;
        d.onclick=()=>{ state.activeGroup=g.id; renderSidebar(); renderChat(); };
        list.appendChild(d);
      });
    }
    actions.innerHTML=`<button class="sb-btn primary" onclick="showCreateGroup()">+ Create</button><button class="sb-btn" onclick="showJoinGroup()">Join</button>`;
  }

  if(state.tab==='dm'){
    list.innerHTML='<div class="sec-label">Conversations</div>';
    const dmPanel = document.getElementById('dm-users'); dmPanel.innerHTML='';
    state.dmContacts.forEach(u=>{
      const convId = getDMId(state.user.uid, u.uid);
      const d=document.createElement('div');
      d.className='ch-item'+(state.activeDM===u.uid?' active':'');
      d.innerHTML=`<div class="av ${avColor(u.uid)}" style="width:24px;height:24px;font-size:10px;">${initials(u.name)}</div><span class="ch-name">${u.name}</span>`;
      d.onclick=()=>{ state.activeDM=u.uid; renderSidebar(); renderChat(); };
      list.appendChild(d);

      const dd=document.createElement('div');
      dd.className='dm-user-item'+(state.activeDM===u.uid?' active':'');
      dd.innerHTML=`<div class="av ${avColor(u.uid)}" style="width:28px;height:28px;font-size:11px;">${initials(u.name)}</div><div><div class="dm-uname">${u.name}</div><div class="dm-ustatus">${u.email||''}</div></div>`;
      dd.onclick=()=>{ state.activeDM=u.uid; renderSidebar(); renderChat(); };
      dmPanel.appendChild(dd);
    });
    if(state.dmContacts.length===0) list.innerHTML+='<div class="empty-state">No conversations yet.</div>';
    actions.innerHTML=`<button class="sb-btn primary" onclick="showNewDM()">+ New DM</button>`;
  }
}

// ---- CHAT ----
function renderChat(){
  if(state.unsubMsg){ state.unsubMsg(); state.unsubMsg=null; }
  const header=document.getElementById('chat-header');
  const msgsArea=document.getElementById('msgs-area');
  const inp=document.getElementById('chat-input');

  if(state.tab==='public'){
    const ch=PUBLIC_CHANNELS.find(c=>c.id===state.activeChannel);
    header.innerHTML=`<span class="chat-header-icon">#</span><div class="chat-header-info"><div class="chat-header-name">${ch.label}</div><div class="chat-header-sub">${ch.desc}</div></div><span class="h-badge h-public">Public</span>`;
    inp.placeholder=`Message #${ch.label}...`;
    listenMessages('public_'+ch.id, msgsArea);
  } else if(state.tab==='group'){
    if(!state.activeGroup||state.myGroups.length===0){
      header.innerHTML=`<span class="chat-header-icon">◈</span><div class="chat-header-info"><div class="chat-header-name">No room selected</div></div><span class="h-badge h-group">Group</span>`;
      msgsArea.innerHTML=`<div class="empty-chat"><div class="empty-chat-icon">◈</div><h3>No group room selected</h3><p>Create a new room or join one with a code to start chatting with your team.</p><div class="empty-btns"><button class="e-btn primary" onclick="showCreateGroup()">+ Create room</button><button class="e-btn sec" onclick="showJoinGroup()">Join with code</button></div></div>`;
      return;
    }
    const g=state.myGroups.find(x=>x.id===state.activeGroup);
    header.innerHTML=`<span class="chat-header-icon">◈</span><div class="chat-header-info"><div class="chat-header-name">${g.name}</div><div class="chat-header-sub">Code: <strong style="font-family:'DM Mono',monospace;color:var(--accent2);">${g.code}</strong></div></div><span class="h-badge h-group">Group</span>`;
    inp.placeholder=`Message ${g.name}...`;
    listenMessages('group_'+g.id, msgsArea);
  } else {
    if(!state.activeDM){
      header.innerHTML=`<div class="chat-header-info"><div class="chat-header-name">Select a person</div><div class="chat-header-sub">Choose someone to start a private chat</div></div><span class="h-badge h-dm">Private</span>`;
      msgsArea.innerHTML=`<div class="empty-chat"><div class="empty-chat-icon">✉</div><h3>Private messages</h3><p>Select a contact or start a new DM conversation.</p><div class="empty-btns"><button class="e-btn primary" onclick="showNewDM()">+ New DM</button></div></div>`;
      return;
    }
    const u=state.dmContacts.find(x=>x.uid===state.activeDM);
    const uName=u?u.name:'Unknown';
    header.innerHTML=`<div class="av ${u?avColor(u.uid):'av-a'}" style="width:32px;height:32px;font-size:13px;">${initials(uName)}</div><div class="chat-header-info"><div class="chat-header-name">${uName}</div><div class="chat-header-sub">Private message</div></div><span class="h-badge h-dm">Private</span>`;
    inp.placeholder=`Message ${uName}...`;
    const convId=getDMId(state.user.uid, state.activeDM);
    listenMessages('dm_'+convId, msgsArea);
  }
}

function listenMessages(collectionId, container){
  const q=query(collection(db,'messages_'+collectionId), orderBy('createdAt','asc'), limit(100));
  state.unsubMsg = onSnapshot(q, snap=>{
    container.innerHTML='';
    if(snap.empty){
      container.innerHTML='<div style="padding:30px 20px;text-align:center;color:var(--text3);font-size:13px;">No messages yet. Say hello! 👋</div>';
      return;
    }
    let lastDate='';
    snap.forEach(docSnap=>{
      const m=docSnap.data();
      const d=m.createdAt?m.createdAt.toDate():new Date();
      const dateLabel=d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
      if(dateLabel!==lastDate){
        lastDate=dateLabel;
        container.innerHTML+=`<div class="day-div"><div class="day-line"></div><span>${dateLabel}</span><div class="day-line"></div></div>`;
      }
      const isOwn=m.uid===state.user.uid;
      const row=document.createElement('div');
      row.className='msg-row'+(isOwn?' own':'');
      const senderPhoto = state.photoCache[m.uid];
      const avContent = senderPhoto
        ? `<img class="av-pic" src="${senderPhoto}" alt=""/>`
        : initials(m.displayName||m.email||'?');
      const avClass = senderPhoto ? 'msg-av' : `msg-av ${avColor(m.uid)}`;
      row.innerHTML=`
        <div class="${avClass}">${avContent}</div>
        <div class="msg-content">
          <div class="msg-meta"><span class="msg-sender">${isOwn?'You':m.displayName||m.email}</span><span>${timeStr(m.createdAt)}</span></div>
          <div class="bubble">${escHtml(m.text)}</div>
        </div>`;
      container.appendChild(row);
    });
    scrollBottom();
  });
}

function escHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ---- SEND ----
window.sendMessage = async function(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text||!state.user) return;
  let collId;
  if(state.tab==='public') collId='messages_public_'+state.activeChannel;
  else if(state.tab==='group'){ if(!state.activeGroup) return; collId='messages_group_'+state.activeGroup; }
  else { if(!state.activeDM) return; collId='messages_dm_'+getDMId(state.user.uid,state.activeDM); }
  inp.value=''; inp.style.height='auto';
  try {
    await addDoc(collection(db,collId),{
      text, uid: state.user.uid,
      displayName: state.user.displayName||state.user.email,
      email: state.user.email,
      photoBase64: state.myPhoto||null,
      createdAt: serverTimestamp()
    });
  } catch(e){ console.error(e); }
};

document.getElementById('chat-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
});

// ---- DM ID ----
function getDMId(a,b){ return [a,b].sort().join('_'); }

// ---- GROUPS ----
async function loadMyGroups(){
  const snap=await getDocs(query(collection(db,'groups'),where('members','array-contains',state.user.uid)));
  state.myGroups=snap.docs.map(d=>({id:d.id,...d.data()}));
}

window.showCreateGroup = function(){
  showModal(`
    <h3>Create a group room</h3>
    <p>Give your room a name. A unique 6-character join code will be generated.</p>
    <input id="m-room-name" placeholder="Room name (e.g. Design Team)" maxlength="32"/>
    <div class="modal-btns">
      <button class="m-btn" onclick="closeModal()">Cancel</button>
      <button class="m-btn confirm" onclick="createGroup()">Create room</button>
    </div>`);
};

window.createGroup = async function(){
  const name=document.getElementById('m-room-name').value.trim();
  if(!name) return;
  const code=genCode();
  const ref=await addDoc(collection(db,'groups'),{ name, code, createdBy:state.user.uid, members:[state.user.uid], createdAt:serverTimestamp() });
  state.myGroups.push({ id:ref.id, name, code, members:[state.user.uid] });
  state.activeGroup=ref.id;
  closeModal();
  switchTab('group');
  showModal(`
    <h3>Room created! 🎉</h3>
    <p>Share this code with anyone you want to invite to <strong>${name}</strong>.</p>
    <div class="code-display">${code}</div>
    <div class="code-hint">They can join using "Join with code" in the Groups tab.</div>
    <div class="modal-btns"><button class="m-btn confirm" onclick="closeModal()">Done</button></div>`);
};

window.showJoinGroup = function(){
  showModal(`
    <h3>Join a group room</h3>
    <p>Enter the 6-character code shared with you.</p>
    <input id="m-join-code" placeholder="Enter code (e.g. AB12CD)" maxlength="6" style="text-transform:uppercase;letter-spacing:0.15em;font-family:'DM Mono',monospace;font-size:20px;text-align:center;"/>
    <div class="modal-btns">
      <button class="m-btn" onclick="closeModal()">Cancel</button>
      <button class="m-btn confirm" onclick="joinGroup()">Join room</button>
    </div>`);
};

window.joinGroup = async function(){
  const code=document.getElementById('m-join-code').value.trim().toUpperCase();
  if(code.length<4) return;
  const snap=await getDocs(query(collection(db,'groups'),where('code','==',code)));
  if(snap.empty){ alert('Room not found. Check the code and try again.'); return; }
  const gDoc=snap.docs[0];
  const gData=gDoc.data();
  const members=gData.members||[];
  if(!members.includes(state.user.uid)){
    const updated=[...members,state.user.uid];
    await setDoc(doc(db,'groups',gDoc.id),{...gData,members:updated});
    state.myGroups.push({id:gDoc.id,...gData,members:updated});
  } else if(!state.myGroups.find(g=>g.id===gDoc.id)){
    state.myGroups.push({id:gDoc.id,...gData});
  }
  state.activeGroup=gDoc.id;
  closeModal();
  switchTab('group');
  renderSidebar();
};

// ---- DMs ----
async function loadDMContacts(){
  const snap=await getDocs(collection(db,'users'));
  state.dmContacts=snap.docs.map(d=>d.data()).filter(u=>u.uid!==state.user.uid);
  // Cache photos for all users
  snap.docs.forEach(d=>{
    const data=d.data();
    if(data.photoBase64) state.photoCache[data.uid]=data.photoBase64;
  });
}

window.showNewDM = async function(){
  await loadDMContacts();
  const items=state.dmContacts.map(u=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="startDM('${u.uid}')">
      <div class="av ${avColor(u.uid)}" style="width:32px;height:32px;font-size:13px;">${initials(u.name)}</div>
      <div><div style="font-size:13px;font-weight:500;">${u.name}</div><div style="font-size:12px;color:var(--text3);">${u.email}</div></div>
    </div>`).join('');
  showModal(`
    <h3>New direct message</h3>
    <p>Choose someone to start a private conversation.</p>
    ${items||'<div style="color:var(--text3);font-size:13px;">No other users found.</div>'}
    <div class="modal-btns" style="margin-top:16px;"><button class="m-btn" onclick="closeModal()">Cancel</button></div>`);
};

window.startDM = function(uid){
  state.activeDM=uid; closeModal(); switchTab('dm'); renderSidebar(); renderChat();
};

// ---- MODAL ----
function showModal(html){ const o=document.getElementById('modal-ov'); o.innerHTML=`<div class="modal">${html}</div>`; o.style.display='flex'; }
window.closeModal = function(){ document.getElementById('modal-ov').style.display='none'; };
window.handleModalClick = function(e){ if(e.target===document.getElementById('modal-ov')) closeModal(); };

// ---- PROFILE PIC ----
function setMyAvatar(base64){
  const av = document.getElementById('my-av');
  av.textContent='';
  av.innerHTML=`<img class="av-pic" src="${base64}" alt=""/>`;
  state.photoCache[state.user.uid]=base64;
}

window.showProfileModal = function(){
  const u = state.user;
  const avHtml = state.myPhoto
    ? `<img class="av-pic" src="${state.myPhoto}" alt=""/>`
    : initials(u.displayName||u.email);
  const avClass = state.myPhoto ? '' : avColor(u.uid);
  showModal(`
    <div class="profile-modal">
      <div class="big-av ${avClass}" onclick="document.getElementById('pic-upload').click()">${avHtml}</div>
      <div class="prof-name">${u.displayName||u.email}</div>
      <div class="prof-email">${u.email}</div>
      <div class="prof-hint">Tap your avatar to change photo</div>
      <div class="modal-btns"><button class="m-btn confirm" onclick="closeModal()">Done</button></div>
    </div>`);
};

window.handlePicUpload = async function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(ev){
    // Resize to max 200px
    const img = new window.Image();
    img.onload = async function(){
      const canvas = document.createElement('canvas');
      const size = 200;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min)/2, sy = (img.height - min)/2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      const base64 = canvas.toDataURL('image/jpeg', 0.8);
      state.myPhoto = base64;
      setMyAvatar(base64);
      // Save to Firestore
      try{
        await setDoc(doc(db,'users',state.user.uid), { photoBase64: base64 }, { merge: true });
      }catch(err){ console.error(err); }
      // Refresh profile modal
      closeModal();
      showProfileModal();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
};
</script>
